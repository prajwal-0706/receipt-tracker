<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Receipt Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧾</text></svg>" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    details[open] summary svg.chev { transform: rotate(90deg); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-indigo-600 text-white flex items-center justify-center font-bold">R</div>
        <div>
          <h1 class="text-lg font-semibold leading-tight">Smart Receipt Tracker</h1>
          <p class="text-xs text-slate-500 leading-tight">Upload receipts. Ask questions.</p>
        </div>
      </div>
      <div id="health" class="flex items-center gap-2 text-sm text-slate-500">
        <span class="w-2 h-2 rounded-full bg-slate-300 animate-pulse"></span>
        <span>checking…</span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8 grid lg:grid-cols-5 gap-6">

    <section class="lg:col-span-3 space-y-6">

      <div class="bg-white border border-slate-200 rounded-xl p-6">
        <h2 class="text-base font-semibold mb-1">Upload receipts</h2>
        <p class="text-sm text-slate-500 mb-4">JPG, PNG, or WebP. Multiple files supported.</p>

        <label id="dropzone"
               class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-slate-300 rounded-lg cursor-pointer hover:bg-slate-50 hover:border-indigo-400 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
          </svg>
          <span class="text-sm text-slate-600"><span class="font-semibold text-indigo-600">Click to browse</span> or drag and drop</span>
          <input id="fileInput" type="file" multiple accept="image/*" class="hidden" />
        </label>

        <div id="uploadStatus" class="mt-4 space-y-2"></div>
      </div>

      <div class="bg-white border border-slate-200 rounded-xl p-6">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h2 class="text-base font-semibold">Receipts</h2>
            <p class="text-sm text-slate-500" id="receiptsCount">loading…</p>
          </div>
          <button id="refreshBtn"
                  class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">Refresh</button>
        </div>
        <div id="receiptsList" class="space-y-3 max-h-[600px] overflow-y-auto scrollbar-thin pr-2"></div>
      </div>

    </section>

    <section class="lg:col-span-2">
      <div class="bg-white border border-slate-200 rounded-xl p-6 sticky top-24">
        <h2 class="text-base font-semibold mb-1">Ask a question</h2>
        <p class="text-sm text-slate-500 mb-4">Natural language. Examples: spending totals, biggest bill, top merchants.</p>

        <form id="queryForm" class="flex gap-2 mb-4">
          <input id="queryInput" type="text" required
                 placeholder="How much did I spend on coffee?"
                 class="flex-1 min-w-0 px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"/>
          <button type="submit" id="queryBtn"
                  class="px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed">
            Ask
          </button>
        </form>

        <div class="mb-4">
          <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">Try one of these</p>
          <div class="flex flex-wrap gap-2" id="suggestions"></div>
        </div>

        <div id="conversation" class="space-y-4 max-h-[480px] overflow-y-auto scrollbar-thin pr-2"></div>
      </div>
    </section>

  </main>

  <script>
    const API = "";
    const $ = (id) => document.getElementById(id);

    const SUGGESTIONS = [
      "How many receipts do I have?",
      "How much did I spend in total?",
      "What's my biggest receipt?",
      "Show top merchants by spend",
      "How much on shopping?",
      "What did I spend on dining?",
    ];

    function suggestionPill(text) {
      const b = document.createElement("button");
      b.type = "button";
      b.textContent = text;
      b.className = "text-xs px-2 py-1 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-700 transition";
      b.onclick = () => { $("queryInput").value = text; $("queryInput").focus(); };
      return b;
    }
    SUGGESTIONS.forEach(s => $("suggestions").appendChild(suggestionPill(s)));

    async function checkHealth() {
      try {
        const r = await fetch(`${API}/healthz`);
        const j = await r.json();
        $("health").innerHTML = `
          <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
          <span>${j.vlm} · ${j.slm}</span>`;
      } catch {
        $("health").innerHTML = `
          <span class="w-2 h-2 rounded-full bg-rose-500"></span>
          <span>API unreachable</span>`;
      }
    }

    function fmtMoney(amount, currency) {
      if (amount === null || amount === undefined) return "—";
      const num = typeof amount === "string" ? parseFloat(amount) : amount;
      const sym = { USD: "$", EUR: "€", GBP: "£", INR: "₹", JPY: "¥" }[currency] || "";
      return `${sym}${num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}${sym ? "" : (currency ? " " + currency : "")}`;
    }

    function fmtDate(d) {
      if (!d) return "—";
      const dt = new Date(d);
      return dt.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function categoryBadge(cat) {
      const colors = {
        groceries: "bg-emerald-100 text-emerald-700",
        dining: "bg-amber-100 text-amber-700",
        transport: "bg-sky-100 text-sky-700",
        fuel: "bg-orange-100 text-orange-700",
        utilities: "bg-cyan-100 text-cyan-700",
        entertainment: "bg-pink-100 text-pink-700",
        health: "bg-red-100 text-red-700",
        shopping: "bg-violet-100 text-violet-700",
        travel: "bg-blue-100 text-blue-700",
        other: "bg-slate-100 text-slate-600",
      };
      return `<span class="text-xs px-2 py-0.5 rounded-full ${colors[cat] || colors.other}">${cat}</span>`;
    }

    function receiptCard(r) {
      const items = r.line_items || [];
      const itemsHtml = items.map(li => `
        <div class="flex items-center justify-between text-sm py-1.5 border-t border-slate-100">
          <div class="flex items-center gap-2 flex-1 min-w-0">
            <span class="truncate">${escapeHtml(li.description)}</span>
            ${categoryBadge(li.category)}
          </div>
          <div class="text-slate-500 ml-2 whitespace-nowrap">
            ${li.quantity > 1 ? `${li.quantity} × ${fmtMoney(li.unit_price, r.currency)} = ` : ""}${fmtMoney(li.total_price, r.currency)}
          </div>
        </div>`).join("");

      return `
        <details class="group border border-slate-200 rounded-lg hover:border-slate-300 transition">
          <summary class="cursor-pointer list-none p-4 flex items-center justify-between">
            <div class="flex-1 min-w-0">
              <div class="font-medium text-slate-900 truncate">${escapeHtml(r.merchant || "Unknown merchant")}</div>
              <div class="text-xs text-slate-500 mt-0.5">${fmtDate(r.receipt_date)} · ${items.length} item${items.length === 1 ? "" : "s"}</div>
            </div>
            <div class="flex items-center gap-3 ml-3">
              <div class="text-right">
                <div class="font-semibold">${fmtMoney(r.total, r.currency)}</div>
                ${r.confidence !== null ? `<div class="text-xs text-slate-400">conf ${(r.confidence * 100).toFixed(0)}%</div>` : ""}
              </div>
              <svg class="chev w-4 h-4 text-slate-400 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
              </svg>
            </div>
          </summary>
          <div class="px-4 pb-4 pt-0 border-t border-slate-100">
            ${itemsHtml || '<div class="text-sm text-slate-400 py-2">No line items extracted.</div>'}
            <div class="flex items-center justify-between text-sm pt-2 mt-2 border-t border-slate-200">
              <span class="text-slate-500">Subtotal · Tax</span>
              <span>${fmtMoney(r.subtotal, r.currency)} · ${fmtMoney(r.tax, r.currency)}</span>
            </div>
          </div>
        </details>`;
    }

    function escapeHtml(s) {
      if (s === null || s === undefined) return "";
      return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
    }

    async function loadReceipts() {
      try {
        const r = await fetch(`${API}/receipts?limit=200`);
        const data = await r.json();
        $("receiptsCount").textContent = data.length === 0
          ? "No receipts uploaded yet."
          : `${data.length} receipt${data.length === 1 ? "" : "s"} stored.`;
        $("receiptsList").innerHTML = data.length === 0
          ? `<div class="text-sm text-slate-400 text-center py-8">Upload a receipt to get started.</div>`
          : data.map(receiptCard).join("");
      } catch (e) {
        $("receiptsList").innerHTML = `<div class="text-sm text-rose-600">Failed to load receipts: ${escapeHtml(e.message)}</div>`;
      }
    }

    function statusRow(text, kind) {
      const colors = { info: "bg-slate-100 text-slate-700", ok: "bg-emerald-100 text-emerald-700", err: "bg-rose-100 text-rose-700" };
      const div = document.createElement("div");
      div.className = `text-sm px-3 py-2 rounded-lg fade-in ${colors[kind] || colors.info}`;
      div.textContent = text;
      return div;
    }

    async function uploadFiles(files) {
      $("uploadStatus").innerHTML = "";
      const pending = statusRow(`Uploading ${files.length} file${files.length === 1 ? "" : "s"}…`, "info");
      $("uploadStatus").appendChild(pending);

      const fd = new FormData();
      for (const f of files) fd.append("files", f, f.name);

      try {
        const r = await fetch(`${API}/receipts`, { method: "POST", body: fd });
        const data = await r.json();
        $("uploadStatus").innerHTML = "";
        if (data.receipts && data.receipts.length > 0) {
          $("uploadStatus").appendChild(statusRow(
            `Extracted ${data.receipts.length} receipt${data.receipts.length === 1 ? "" : "s"} successfully.`, "ok"));
        }
        if (data.skipped_duplicates && data.skipped_duplicates.length > 0) {
          $("uploadStatus").appendChild(statusRow(
            `${data.skipped_duplicates.length} duplicate${data.skipped_duplicates.length === 1 ? "" : "s"} skipped.`, "info"));
        }
        for (const f of data.failed || []) {
          $("uploadStatus").appendChild(statusRow(`${f.filename}: ${f.error}`, "err"));
        }
        await loadReceipts();
      } catch (e) {
        $("uploadStatus").innerHTML = "";
        $("uploadStatus").appendChild(statusRow(`Upload failed: ${e.message}`, "err"));
      }
    }

    $("fileInput").addEventListener("change", e => {
      if (e.target.files.length > 0) uploadFiles(e.target.files);
    });

    const dz = $("dropzone");
    ["dragenter", "dragover"].forEach(ev =>
      dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add("bg-indigo-50", "border-indigo-500"); }));
    ["dragleave", "drop"].forEach(ev =>
      dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove("bg-indigo-50", "border-indigo-500"); }));
    dz.addEventListener("drop", e => {
      if (e.dataTransfer.files.length > 0) uploadFiles(e.dataTransfer.files);
    });

    function turnNode(question, answer, sql, rows) {
      const div = document.createElement("div");
      div.className = "border border-slate-200 rounded-lg p-3 fade-in";
      const sqlHtml = sql ? `
        <details class="mt-2">
          <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-700">Generated SQL</summary>
          <pre class="text-xs bg-slate-50 p-2 rounded mt-1 overflow-x-auto text-slate-700">${escapeHtml(sql)}</pre>
        </details>` : "";
      div.innerHTML = `
        <div class="text-sm text-slate-500 mb-1">You asked</div>
        <div class="text-sm font-medium text-slate-900 mb-3">${escapeHtml(question)}</div>
        <div class="text-sm text-slate-500 mb-1">Answer</div>
        <div class="text-sm text-slate-800 leading-relaxed">${escapeHtml(answer)}</div>
        ${sqlHtml}`;
      return div;
    }

    $("queryForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const q = $("queryInput").value.trim();
      if (!q) return;
      $("queryBtn").disabled = true;
      $("queryBtn").textContent = "Asking…";
      try {
        const r = await fetch(`${API}/query`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ q }),
        });
        const data = await r.json();
        $("conversation").prepend(turnNode(data.question, data.answer || "(no answer)", data.sql, data.rows));
        $("queryInput").value = "";
      } catch (err) {
        $("conversation").prepend(turnNode(q, `Error: ${err.message}`, null, null));
      } finally {
        $("queryBtn").disabled = false;
        $("queryBtn").textContent = "Ask";
      }
    });

    $("refreshBtn").addEventListener("click", loadReceipts);

    checkHealth();
    loadReceipts();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
